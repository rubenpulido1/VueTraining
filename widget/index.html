<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Learning Vue</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
       
        <style>
            .box {
                padding: 100px 0;
                width: 400px;
                text-align: center;
                background: #ddd;
                margin: 20px;
                display: inline-block;
            }    
            body {
                background: #eee;
                max-width: 960px;
                margin: 20px auto;
            }
            p, h3, ul {
                margin: 0;
                padding: 0;
            }
            li {
                list-style-type: none;
                background: #fff;
                margin: 20px auto;
                padding: 10px 20px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            li.fav {
                background: #ff9ed2;
                color: white;
            }
        </style>
    </head>
    <body>
        <h1>Hello Vue!</h1>
    

        <div id="app">
            
            <!-- Attribute Binding -->
            <a v-bind:href="url"> Linked Website </a>

            <div v-if="showBooks">
                <ul>
                    <li 
                        v-for="book in books" 
                        :class="{fav: book.isFav}"
                        @click="toggleFav(book)">
                        <img :src="book.img" :alt="book.title">
                        <h3> {{ book.title }} </h3> 
                        <p>{{ book.author }}</p>
                    </li>
                </ul>
            </div>

            <button @click="toggleShowBooks">
                <span v-if="showBooks"> Hide Books </span>
                <span v-else> Show Books </span>
            </button>

            <div v-show="showBooks"> Currently showing books</div>

            <br>

            <!--  Updating Data Properties in Template using Directives -->
            <button v-on:click="age++">Increase Age</button>
            <button v-on:click="age--">Decrease Age</button>
            <div @click="changeTitle"> Change book title</div>

            <br>

            <!-- Mouse Events -->
            <div class="box" @mouseover="handleEvent"> Mouse Over </div>
            
            <div class="box" @mouseleave="handleEvent"> Mouse Leave </div>
            
            <div class="box" @dblclick="handleEvent"> Double Click </div>
            
            <div class="box" @mousemove="handleMouseMove"> Position -  {{ x }}  {{ y }}</div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
